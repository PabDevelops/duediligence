<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle border -->
  <circle cx="32" cy="32" r="31" stroke="#a78bfa" strokeWidth="2" fill="none"/>
  
  <!-- Inner circle background -->
  <circle cx="32" cy="32" r="30" fill="#0B0E14"/>
  
  <!-- Accent circle -->
  <circle cx="32" cy="32" r="28" stroke="#a78bfa" strokeWidth="1" fill="none" opacity="0.3"/>
  
  <!-- Main symbol - stylized circle with dot (like the logo mark) -->
  <g transform="translate(32, 32)">
    <!-- Background circle for contrast -->
    <circle cx="0" cy="0" r="16" fill="none" stroke="#a78bfa" strokeWidth="2"/>
    
    <!-- Inner dot accent -->
    <circle cx="0" cy="0" r="5" fill="#a78bfa"/>
    
    <!-- Small decorative elements -->
    <circle cx="8" cy="0" r="2" fill="#a78bfa" opacity="0.6"/>
    <circle cx="-8" cy="0" r="2" fill="#a78bfa" opacity="0.6"/>
    <circle cx="0" cy="8" r="2" fill="#a78bfa" opacity="0.6"/>
    <circle cx="0" cy="-8" r="2" fill="#a78bfa" opacity="0.6"/>
  </g>
</svg>
